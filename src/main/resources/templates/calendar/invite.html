<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>초대합니다! - Kari Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="flex-center-page">

<div class="invite-card">
    <div class="icon">💌</div>
    <h1 th:text="${calendar.title}">일정 제목</h1>
    <p class="description" th:text="${calendar.description}">일정 설명이 들어가는 자리입니다.</p>

    <form id="joinForm" th:action="@{/schedule/join/{key}(key=${calendar.shareKey})}" method="POST">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" name="color" id="selectedColor">

        <div class="form-group">
            <label>나의 고유 컬러 <span style="font-weight: normal; font-size: 13px; color: #999;">(이미 사용 중인 색상은 선택 불가)</span></label>
            <div class="color-grid" id="colorPicker">
            </div>
        </div>

        <button type="submit" class="btn-join">이 색상으로 참여하기</button>
    </form>
</div>

<script th:inline="javascript">
    // 서버에서 넘겨준 이미 선택된 색상 리스트 (컨트롤러에서 보내줘야 함)

    const occupiedColors = /*[[${occupiedColors}]]*/ [];

    // 스크립트 상단에 추가
    console.log("이미 선택된 색상들:", occupiedColors);

    const palette = [
        '#FFB3BA', '#FF007F', '#FF6B6B', '#FF9F43', '#FECA57',
        '#FFF200', '#1DD1A1', '#009432', '#00D2D3', '#48DBFB',
        '#2E86DE', '#0652DD', '#1B1464', '#5F27CD', '#833471',
        '#F368E0', '#D980FA', '#9980FA', '#576574', '#222F3E'
    ];

    function initColorPicker() {
        const picker = document.getElementById('colorPicker');
        let firstAvailableSet = false;

        palette.forEach((color) => {
            const label = document.createElement('label');
            label.className = 'color-option';
            label.style.backgroundColor = color;

            // 이미 사용 중인 색상인지 확인
            const isOccupied = occupiedColors && occupiedColors.includes(color);

            if (isOccupied) {
                label.classList.add('disabled');
            } else {
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'color_radio'; // hidden 필드와 이름 안 겹치게 설정
                input.value = color;

                // 첫 번째 사용 가능한 색상을 기본값으로 선택
                if (!firstAvailableSet) {
                    input.checked = true;
                    document.getElementById('selectedColor').value = color;
                    firstAvailableSet = true;
                }

                input.onclick = () => {
                    document.getElementById('selectedColor').value = color;
                };
                label.appendChild(input);
            }
            picker.appendChild(label);
        });
    }

    initColorPicker();

    // 폼 제출 전 체크
    document.getElementById('joinForm').onsubmit = function() {
        if (!document.getElementById('selectedColor').value) {
            alert("나만의 컬러를 하나 골라주세요! 🎨");
            return false;
        }
        return true;
    };
</script>

</body>
</html>
