<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kari Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<script>
    function goToProfile() {
        // 1. 알림창 띄우기
        alert("아직 개발 안 했으니 일정이나 만들고 놀아! ✨");

        // 2. 확인 버튼 누르면 페이지 이동
        // location.href = '/profile';
    }
</script>
<body>

<div class="main-container">
    <header class="header">
        <h1>나의 일정 🌸</h1>
        <button class="profile-btn" onclick="goToProfile()">
            <i class="fa-solid fa-user"></i>
        </button>
    </header>

    <!-- 1. 내가 만든 달력 섹션 -->
    <div class="section-title">
        <i class="fa-solid fa-crown"></i> 내가 만든 일정
    </div>
    <!-- 내가 만든 달력 섹션 반복문 -->
    <div class="calendar-list">
        <!-- th:each를 사용해서 DB에서 가져온 개수만큼 카드를 생성해요! -->
        <div class="calendar-card"
             th:each="cal : ${ownerCalendars}"
             th:data-sharekey="${cal.shareKey}"
             onclick="location.href='/schedule/detail/' + this.getAttribute('data-sharekey')">

            <span class="role-tag tag-owner">방장</span>
            <h3 th:text="${cal.title}">일정 제목</h3>
            <p>
                <i class="fa-solid fa-calendar-days"></i>
                생성일: <span th:text="${#temporals.format(cal.createdAt, 'yyyy-MM-dd')}">2026-04-30</span>
            </p>
        </div>

        <!-- 만약 데이터가 하나도 없다면? -->
        <div th:if="${#lists.isEmpty(ownerCalendars)}" class="empty-state">
            아직 생성한 달력이 없어요. 우측 하단 + 버튼을 눌러보세요! ✨
        </div>
    </div>

    <!-- 2. 공유받은 달력 섹션 -->
    <div class="section-title">
        <i class="fa-solid fa-handshake-angle"></i> 공유받은 일정
    </div>
    <div class="calendar-list">
        <!-- 클릭 시 경로 수정: /schedule/detail/{shareKey} -->
        <div class="calendar-card" onclick="location.href='/schedule/detail/KARI-SHARE-KEY'">
            <span class="role-tag tag-member">참여</span>
            <h3>개발 프로젝트 일정 💻</h3>
            <p><i class="fa-solid fa-users"></i> 참여 인원: 3명</p>
        </div>
    </div>
</div>

<!-- 🌟 새 일정 만들기 버튼 경로 수정: /schedule/new -->
<a href="/schedule/new" class="fab" title="새 일정 만들기">
    <i class="fa-solid fa-plus"></i>
</a>

</body>
</html>
