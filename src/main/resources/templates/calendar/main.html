<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kari Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>

<script>
    function goToProfile() {
        // 1. 알림창 띄우기
        alert("마이페이지로 이동합니다! ✨");

        // 2. 확인 버튼 누르면 페이지 이동
        location.href = '/profile';
    }
</script>
<body>

<div class="main-container">
    <header class="header">
        <h1>나의 일정 🌸</h1>
        <button class="profile-btn" onclick="goToProfile()">
            <i class="fa-regular fa-user-circle"></i>
        </button>
    </header>

    <div class="section-title">
        <i class="fa-solid fa-crown"></i> 내가 만든 일정
    </div>
    <div class="calendar-list">
        <div class="calendar-card"
             th:each="cal : ${ownerCalendars}"
             th:data-sharekey="${cal.shareKey}"
             onclick="location.href='/schedule/detail/' + this.getAttribute('data-sharekey')">

            <span class="role-tag tag-owner">방장</span>
            <h3 th:text="${cal.title}">일정 제목</h3>
            <p>
                <i class="fa-solid fa-calendar-days"></i>
                생성일: <span th:text="${#temporals.format(cal.createdAt, 'yyyy-MM-dd')}">2026-04-30</span>
            </p>
        </div>

        <div th:if="${#lists.isEmpty(ownerCalendars)}" class="empty-state">
            아직 생성한 달력이 없어요. 우측 하단 + 버튼을 눌러보세요! ✨
        </div>
    </div>

    <div class="section-title">
        <i class="fa-solid fa-handshake-angle"></i> 공유받은 일정
    </div>
    <div class="calendar-list">
        <div class="calendar-card"
             th:each="cal : ${memberCalendars}"
             th:data-sharekey="${cal.shareKey}"
             onclick="location.href='/schedule/detail/' + this.getAttribute('data-sharekey')">
            <span class="role-tag tag-member">참여</span>
            <h3 th:text="${cal.title}">공유받은 일정 제목</h3>
            <p>
                <i class="fa-solid fa-calendar-days"></i>
                생성일: <span th:text="${#temporals.format(cal.createdAt, 'yyyy-MM-dd')}">2026-05-28</span>
            </p>
        </div>

        <div th:if="${#lists.isEmpty(memberCalendars)}" class="empty-state">
            아직 공유받은 일정이 없어요. 친구에게 공유 코드를 받아보세요! 🔗
        </div>
    </div>
</div>

<a href="/schedule/new" class="fab" title="새 일정 만들기">
    <i class="fa-solid fa-plus"></i>
</a>

</body>
</html>
