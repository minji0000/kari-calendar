<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Kari Cal</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #fffafb; padding: 20px; display: flex; justify-content: center; }
        .join-container { width: 100%; max-width: 450px; background: white; padding: 2.5rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(255, 154, 158, 0.1); }
        h2 { color: #ff9a9e; text-align: center; margin-bottom: 2rem; }
        .section-title { font-size: 0.9rem; color: #ff9a9e; font-weight: bold; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #ffebee; padding-bottom: 5px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; color: #666; font-size: 0.85rem; font-weight: 600; }
        input, select { width: 100%; padding: 0.9rem; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; background-color: #fcfcfc; }
        input:focus { outline: none; border-color: #ff9a9e; background-color: white; }
        .gender-group { display: flex; gap: 10px; }
        .btn-submit { width: 100%; padding: 1.1rem; border: none; border-radius: 12px; background-color: #ff9a9e; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 2rem; }
        .error-msg { color: #ff4d4d; font-size: 0.85rem; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="join-container">
    <h2>회원가입 🌸</h2>
    <form th:action="@{/join}" method="post">

        <div class="section-title">필수 정보</div>
        <div class="input-group">
            <label>아이디</label>
            <input type="text" name="userId" placeholder="아이디 입력" required>
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" name="password" placeholder="비밀번호 입력" required>
        </div>
        <div class="input-group">
            <label>닉네임</label>
            <input type="text" name="nickname" placeholder="서비스에서 사용할 이름" required>
        </div>

        <div class="section-title">추가 정보(여기 밑에는 귀찮으면 입력 안 해도 돼 !)</div>
        <div class="input-group">
            <label>이름</label>
            <input type="text" name="realName" placeholder="본명 입력">
        </div>
        <div class="input-group">
            <label>이메일</label>
            <input type="email" name="email" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>전화번호</label>
            <input type="tel" name="phoneNumber" placeholder="-빼고 숫자만 적어주세요.">
        </div>
        <div class="input-group">
            <label>생년월일</label>
            <input type="text" name="birthday" placeholder="예: 19950527 (8자리)" maxlength="8">
        </div>
        <div class="input-group">
            <label>성별</label>
            <select name="gender">
                <option value="">선택 안 함</option>
                <option value="M">남성 (M)</option>
                <option value="F">여성 (F)</option>
            </select>
        </div>

        <input type="hidden" name="provider" value="LOCAL">

        <button type="submit" class="btn-submit">가입 완료</button>
        <p th:if="${error}" class="error-msg" th:text="${error}"></p>
    </form>
</div>
</body>
</html>
