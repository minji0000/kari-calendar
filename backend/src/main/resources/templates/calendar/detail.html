<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>달력 상세 - Kari Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #ff6b6b; --bg-color: #f9f9f9; }
        body { background-color: var(--bg-color); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; padding-bottom: 150px; }

        .detail-container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* 상단 헤더 & 설명 */
        .header-section { border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 30px; }
        .header-section h1 { font-size: 28px; color: #333; margin: 0 0 10px 0; }
        .description { color: #777; font-size: 16px; margin: 0; }

        /* 초대 코드 박스 */
        .share-card {
            background: #fff5f5; border: 1px dashed var(--main-color);
            padding: 15px 25px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px;
        }
        .share-key { font-family: 'Courier New', monospace; font-size: 20px; color: var(--main-color); font-weight: 900; letter-spacing: 2px; }
        .copy-btn { background: var(--main-color); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }

        /* 달력 내비게이션 */
        .calendar-nav { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 25px; }
        .nav-btn { background: none; border: 1px solid #ddd; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
        #currentMonthYear { font-size: 24px; font-weight: bold; color: #333; min-width: 180px; text-align: center; }

        /* 달력 그리드 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { padding: 10px; font-weight: bold; text-align: center; color: #999; font-size: 14px; }
        .date-cell {
            background: white; border: 1px solid #f1f1f1; border-radius: 12px;
            min-height: 100px; padding: 10px; position: relative; transition: 0.2s; cursor: pointer;
        }

        /* 오늘 날짜 강조 */
        .date-cell.today { border: 2px solid var(--main-color) !important; background: #fff8f8; }
        .date-cell.today::after { content: 'TODAY'; position: absolute; bottom: 8px; right: 8px; font-size: 9px; color: var(--main-color); font-weight: bold; }

        /* 날짜 선택 스타일 */
        .date-cell.selected { background-color: #fff0f0; border: 2px solid var(--main-color); box-shadow: inset 0 0 8px rgba(255,107,107,0.1); }

        .date-num { font-weight: bold; font-size: 16px; color: #444; }
        .sun { color: #ff6b6b; }
        .sat { color: #45aaf2; }

        /* 하단 고정 플로팅 바 */
        .floating-bar {
            position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: white; padding: 20px 30px;
            border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex; justify-content: space-between; align-items: center;
            transition: bottom 0.4s ease-out; z-index: 1000;
        }
        .floating-bar.show { bottom: 30px; }

        .selection-detail { display: flex; flex-direction: column; gap: 12px; }
        .color-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .color-chip {
            width: 24px; height: 24px; border-radius: 50%;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .color-chip.selected { border-color: #333; transform: scale(1.2); }
        .btn-confirm { background: var(--main-color); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="detail-container">
    <section class="header-section">
        <h1 th:text="${calendar.title}">테스트용 우리 가족 달력 👨‍👩‍👧</h1>
        <p class="description" th:text="${calendar.description}">설명이 들어가는 자리입니다.</p>
    </section>

    <section class="share-card">
        <div class="share-info"><span>초대 코드</span> <span class="share-key" id="shareKey" th:text="${calendar.shareKey}">KARI-TEST</span></div>
        <button class="copy-btn" onclick="copyKey()"><i class="fa-regular fa-copy"></i> 코드 복사</button>
    </section>

    <div class="calendar-nav">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <div id="currentMonthYear"></div>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="floating-bar" id="floatingBar">
    <div class="selection-detail">
        <div class="info"><span class="select-count" id="selectCount">0</span>일 선택됨</div>
        <div class="color-selector" id="colorPicker">
        </div>
    </div>
    <button class="btn-confirm" onclick="submitDates()">일정 등록하기</button>
</div>

<script>
    let currentNavDate = new Date();
    let selectedDates = [];
    let myColor = '#ff6b6b'; // 기본 선택 컬러

    const palette = [
        '#ff6b6b', '#ff9f43', '#feca57', '#1dd1a1', '#48dbfb',
        '#5f27cd', '#ff9ff3', '#54a0ff', '#00d2d3', '#222f3e'
    ];

    function initColorPicker() {
        const picker = document.getElementById('colorPicker');
        palette.forEach((color, idx) => {
            const chip = document.createElement('div');
            chip.className = `color-chip ${color === myColor ? 'selected' : ''}`;
            chip.style.background = color;
            chip.onclick = () => selectMyColor(color, chip);
            picker.appendChild(chip);
        });
    }

    function selectMyColor(color, element) {
        myColor = color;
        // CSS 변수 업데이트해서 오늘 날짜나 선택 효과에 반영
        document.documentElement.style.setProperty('--main-color', color);

        // 칩 선택 효과 이동
        document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');

        renderCalendar(); // 달력 색상 갱신
    }

    function renderCalendar() {
        const year = currentNavDate.getFullYear();
        const month = currentNavDate.getMonth();
        document.getElementById('currentMonthYear').innerText = `${year}년 ${month + 1}월`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
        weekDays.forEach((day, idx) => {
            const colorClass = idx === 0 ? 'sun' : (idx === 6 ? 'sat' : '');
            grid.innerHTML += `<div class="day-label ${colorClass}">${day}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const today = new Date();

        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
            const isSelected = selectedDates.includes(dateStr) ? 'selected' : '';
            const dayOfWeek = new Date(year, month, d).getDay();
            const colorClass = dayOfWeek === 0 ? 'sun' : (dayOfWeek === 6 ? 'sat' : '');

            grid.innerHTML += `
                <div class="date-cell ${isToday ? 'today' : ''} ${isSelected}" onclick="toggleDate('${dateStr}', this)">
                    <div class="date-num ${colorClass}">${d}</div>
                </div>
            `;
        }
    }

    function toggleDate(dateStr, element) {
        const index = selectedDates.indexOf(dateStr);
        if (index > -1) {
            selectedDates.splice(index, 1);
            element.classList.remove('selected');
        } else {
            selectedDates.push(dateStr);
            element.classList.add('selected');
        }

        const floatingBar = document.getElementById('floatingBar');
        document.getElementById('selectCount').innerText = selectedDates.length;

        if (selectedDates.length > 0) floatingBar.classList.add('show');
        else floatingBar.classList.remove('show');
    }

    function changeMonth(diff) {
        currentNavDate.setMonth(currentNavDate.getMonth() + diff);
        renderCalendar();
    }

    function copyKey() {
        const key = document.getElementById('shareKey').innerText;
        navigator.clipboard.writeText(key).then(() => alert('코드가 복사되었습니다!'));
    }

    function submitDates() {
        alert(`선택된 색상: ${myColor}\n선택된 날짜들: ${selectedDates.join(', ')}`);
    }

    initColorPicker();
    renderCalendar();
</script>
</body>
</html>
