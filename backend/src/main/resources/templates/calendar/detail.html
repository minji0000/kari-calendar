<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>달력 상세 - Kari Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #ff9a9e;
            --bg-color: #fffafb;
            --point-pink: #ff6b6b;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 150px;
            color: #444;
        }

        .detail-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 154, 158, 0.15);
        }

        .header-section { border-bottom: 2px solid #fdf2f2; padding-bottom: 20px; margin-bottom: 30px; }
        .header-section h1 { font-size: 28px; color: #333; margin: 0 0 10px 0; }
        .description { color: #888; font-size: 16px; margin: 0; }

        .share-card {
            background: #fff5f6; border: 1px dashed var(--main-color);
            padding: 15px 25px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px;
        }
        .share-key { font-family: 'Courier New', monospace; font-size: 20px; color: var(--main-color); font-weight: 900; letter-spacing: 2px; }
        .copy-btn { background: var(--main-color); color: white; border: none; padding: 8px 18px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .copy-btn:hover { background-color: #ff858a; }

        .calendar-nav { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 25px; }
        .nav-btn { background: white; border: 1px solid #ffebee; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; color: var(--main-color); transition: 0.2s; }
        .nav-btn:hover { background-color: var(--bg-color); }
        #currentMonthYear { font-size: 24px; font-weight: bold; color: #555; min-width: 180px; text-align: center; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-label { padding: 10px; font-weight: bold; text-align: center; color: #bbb; font-size: 14px; }
        .date-cell {
            background: white; border: 1px solid #fdf2f2; border-radius: 15px;
            min-height: 100px; padding: 10px; position: relative; transition: 0.2s; cursor: pointer;
        }
        .date-cell:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 154, 158, 0.1); }

        .date-cell.today { border: 2px solid var(--main-color) !important; background: #fffafa; }
        .date-cell.today::after { content: '오늘'; position: absolute; bottom: 8px; right: 10px; font-size: 10px; color: var(--main-color); font-weight: bold; }
        .date-cell.selected { background-color: #fff0f1; border: 2px solid var(--main-color); }

        .date-num { font-weight: bold; font-size: 16px; color: #666; }
        .sun { color: #ff8b8b; }
        .sat { color: #8bb9ff; }

        .floating-bar {
            position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: white; padding: 20px 30px;
            border-radius: 30px; box-shadow: 0 15px 40px rgba(255, 154, 158, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        .floating-bar.show { bottom: 30px; }

        .selection-detail { display: flex; flex-direction: column; gap: 12px; }
        .info { font-weight: bold; color: #555; }
        #selectCount { color: var(--main-color); }
        .color-selector {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .color-selector { grid-template-columns: repeat(5, 1fr); }
        }
        .color-chip {
            width: 24px; height: 24px; border-radius: 50%;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .color-chip.selected { border-color: #333; transform: scale(1.2); }
        /* 🌟 사용 중인 색상 스타일 */
        .color-chip.disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        .btn-confirm { background: var(--main-color); color: white; border: none; padding: 15px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(255, 154, 158, 0.3); }

        /* 🌟 동그라미 바구니 왼쪽 정렬 */
        .color-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
            justify-content: flex-start; /* 왼쪽 정렬 */
            min-height: 12px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .more-count {
            font-size: 10px;
            color: #888;
            font-weight: bold;
            line-height: 12px;
        }
    </style>
</head>
<body>

<div class="detail-container">
    <section class="header-section">
        <h1 th:text="${calendar.title}">테스트용 우리 가족 달력 👨‍👩‍👧</h1>
        <p class="description" th:text="${calendar.description}">설명이 들어가는 자리입니다.</p>
    </section>

    <section class="share-card">
        <div class="share-info"><span>초대 코드</span> <span class="share-key" id="shareKey" th:text="${calendar.shareKey}">KARI-TEST</span></div>
        <button class="copy-btn" onclick="copyKey()"><i class="fa-regular fa-copy"></i> 코드 복사</button>
    </section>

    <div class="calendar-nav">
        <button class="nav-btn" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <div id="currentMonthYear"></div>
        <button class="nav-btn" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="floating-bar" id="floatingBar">
    <div class="selection-detail">
        <div class="info"><span id="selectCount">0</span>일 선택됨</div>
        <div class="color-selector" id="colorPicker"></div>
    </div>
    <button class="btn-confirm" onclick="save()">일정 등록하기</button>
</div>

<script>
    let currentNavDate = new Date();
    let selectedDates = [];
    let myColor = '#FFB3BA';
    const palette = [
        '#FFB3BA', '#FF007F', '#FF6B6B', '#FF9F43', '#FECA57',
        '#FFF200', '#1DD1A1', '#009432', '#00D2D3', '#48DBFB',
        '#2E86DE', '#0652DD', '#1B1464', '#5F27CD', '#833471',
        '#F368E0', '#D980FA', '#9980FA', '#576574', '#222F3E'
    ];

    function initColorPicker() {
        const picker = document.getElementById('colorPicker');
        picker.innerHTML = ''; // 초기화
        palette.forEach((color, idx) => {
            const chip = document.createElement('div');
            chip.className = `color-chip ${color === myColor ? 'selected' : ''}`;
            chip.style.background = color;
            chip.dataset.color = color;
            chip.onclick = () => selectMyColor(color, chip);
            picker.appendChild(chip);
        });
    }

    function selectMyColor(color, element) {
        if (element.classList.contains('disabled')) {
            alert("이 색상은 다른 분이 이미 선점하셨어요! 🎨");
            return;
        }
        myColor = color;
        document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
        document.querySelector('.btn-confirm').style.backgroundColor = color;
    }

    function renderCalendar() {
        const year = currentNavDate.getFullYear();
        const month = currentNavDate.getMonth();
        document.getElementById('currentMonthYear').innerText = `${year}년 ${month + 1}월`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
        weekDays.forEach((day, idx) => {
            const colorClass = idx === 0 ? 'sun' : (idx === 6 ? 'sat' : '');
            grid.innerHTML += `<div class="day-label ${colorClass}">${day}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const today = new Date();

        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        for (let d = 1; d <= lastDate; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
            const isSelected = selectedDates.includes(dateStr) ? 'selected' : '';
            const dayOfWeek = new Date(year, month, d).getDay();
            const colorClass = dayOfWeek === 0 ? 'sun' : (dayOfWeek === 6 ? 'sat' : '');

            grid.innerHTML += `
                <div class="date-cell ${isToday ? 'today' : ''} ${isSelected}"
                     data-date="${dateStr}"
                     onclick="toggleDate('${dateStr}', this)">
                    <div class="date-num ${colorClass}">${d}</div>
                    <div class="color-dots" id="dots-${dateStr}"></div>
                </div>
            `;
        }
        loadMyAvailability();
    }

    function toggleDate(dateStr, element) {
        const index = selectedDates.indexOf(dateStr);
        if (index > -1) {
            selectedDates.splice(index, 1);
            element.classList.remove('selected');
        } else {
            selectedDates.push(dateStr);
            element.classList.add('selected');
        }

        const floatingBar = document.getElementById('floatingBar');
        document.getElementById('selectCount').innerText = selectedDates.length;

        if (selectedDates.length > 0) floatingBar.classList.add('show');
        else floatingBar.classList.remove('show');
    }

    function changeMonth(diff) {
        currentNavDate.setMonth(currentNavDate.getMonth() + diff);
        renderCalendar();
    }

    function copyKey() {
        const key = document.getElementById('shareKey').innerText;
        navigator.clipboard.writeText(key).then(() => alert('코드가 복사되었습니다! 🌸'));
    }

    function save() {
        if (!selectedDates || selectedDates.length === 0) {
            alert("선택된 날짜가 없잖아!");
            return;
        }

        const scheduleId = "[[${calendar.id}]]";
        const requestData = selectedDates.map(date => ({
            scheduleId: parseInt(scheduleId),
            availableDate: date,
            color: myColor,
            note: ""
        }));

        fetch('/api/availability/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestData)
        })
            .then(response => {
                if (response.ok) {
                    alert("일정이 성공적으로 저장되었습니다! 🎉");
                    location.reload();
                } else {
                    alert("저장에 실패했습니다.");
                }
            });
    }

    initColorPicker();
    renderCalendar();

    async function loadMyAvailability() {
        const pathSegments = window.location.pathname.split('/');
        const scheduleId = pathSegments[pathSegments.length - 1];

        try {
            const response = await fetch(`/api/availability/${scheduleId}`);
            if (response.ok) {
                const data = await response.json();

                // 🌟 사용 중인 컬러 목록 추출
                const usedColors = data.map(item => item.color.toUpperCase());

                // 🌟 컬러 피커 업데이트 (남이 쓰는 색 막기)
                document.querySelectorAll('.color-chip').forEach(chip => {
                    const chipColor = chip.dataset.color.toUpperCase();
                    if (usedColors.includes(chipColor)) {
                        chip.classList.add('disabled');
                        // 만약 내 기본색이 이미 남이 쓰는 색이라면, 다음 사용 가능한 색으로 자동 변경
                        if (myColor.toUpperCase() === chipColor) {
                            const nextColor = palette.find(p => !usedColors.includes(p.toUpperCase()));
                            if(nextColor) {
                                myColor = nextColor;
                                document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('selected'));
                                // 이 시점엔 아직 다음 칩이 생성 전일 수 있으므로 렌더링 후 처리가 안전하지만
                                // 로직 흐름상 다시 init하거나 강조 표시 로직 재실행
                            }
                        }
                    }
                });

                data.forEach(item => {
                    applyColorToCalendar(item.availableDate, item.color);
                });
            }
        } catch (error) { console.error("데이터 로드 실패:", error); }
    }

    function applyColorToCalendar(dateStr, color) {
        const dotsContainer = document.getElementById(`dots-${dateStr}`);
        if (dotsContainer) {
            const currentDots = dotsContainer.querySelectorAll('.dot').length;
            const limit = 3;

            if (currentDots < limit) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.backgroundColor = color;
                dotsContainer.appendChild(dot);
            } else if (currentDots === limit) {
                const more = document.createElement('span');
                more.className = 'more-count';
                more.innerText = '+1';
                dotsContainer.appendChild(more);
            } else {
                const more = dotsContainer.querySelector('.more-count');
                const count = parseInt(more.innerText.replace('+', '')) + 1;
                more.innerText = `+${count}`;
            }
        }
    }
</script>
</body>
</html>
